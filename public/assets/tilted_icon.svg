<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <polygon points="50,45 35,75 65,75" fill="#475569"/>
  
  <!-- Board -->
  <g transform="rotate(15 50 45)">
    <rect x="15" y="42" width="70" height="6" rx="3" fill="url(#boardGrad)"/>
    <!-- Orb -->
    <circle cx="30" cy="35" r="7" fill="#fef08a"/>
    <!-- Weight -->
    <rect x="70" y="32" width="12" height="10" rx="2" fill="#f87171"/>
  </g>
</svg>
